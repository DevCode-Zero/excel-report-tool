<!DOCTYPE html>
<html>
<head>
<title>Excel Report Generator</title>

<link rel="stylesheet" href="/static/style.css">
<style>

body{
font-family: Arial;
background:#f4f6f9;
text-align:center;
margin-top:100px;
}

.upload-box{
background:white;
padding:40px;
width:400px;
margin:auto;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

button{
padding:10px 20px;
background:#2f80ed;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="upload-box">

<h2>Excel Report Generator</h2>

<form action="/upload" enctype="multipart/form-data" method="post">

<input type="file" name="files" multiple>

<br><br>

<button type="submit">Generate Report</button>

</form>

</div>

</body>
</html>
